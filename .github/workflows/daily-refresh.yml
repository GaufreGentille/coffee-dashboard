name: Daily Refresh

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh news cache
        run: curl -s "https://kissasoko.netlify.app/.netlify/functions/get-news?refresh=1"

      - name: Refresh markets cache
        run: curl -s "https://kissasoko.netlify.app/.netlify/functions/get-markets"

      - name: Refresh Sprudge community cache
        run: curl -s "https://kissasoko.netlify.app/.netlify/functions/get-sprudge?refresh=1"

      - name: Refresh gear cache
        run: curl -s "https://kissasoko.netlify.app/.netlify/functions/get-gear?refresh=1"

      - name: Refresh science cache
        run: curl -s "https://kissasoko.netlify.app/.netlify/functions/get-science?refresh=1"

      - name: Done
        run: echo "All caches refreshed at $(date)"
