name: Daily Refresh

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh content cache
        run: curl -s "https://kissasoko.netlify.app/.netlify/functions/get-news?refresh=1"

      - name: Refresh markets cache
        run: curl -s "https://kissasoko.netlify.app/.netlify/functions/get-markets"
