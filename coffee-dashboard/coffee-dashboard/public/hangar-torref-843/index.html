// Shim : reproduit l'API window.storage des artifacts Claude avec localStorage
window.storage = {
  async get(key) {
    const v = localStorage.getItem("mmr:" + key);
    if (v === null) throw new Error("not found");
    return { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem("mmr:" + key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem("mmr:" + key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith("mmr:" + (prefix || ""))) keys.push(k.slice(4));
    }
    return { keys };
  },
};

// Connexions : parcours en largeur sur les cases occupées adjacentes (orthogonales)
function computeFlow(grid) {
  const keys = Object.keys(grid);
  const neigh = (k) => {
    const [r, c] = k.split(",").map(Number);
    return [`${r - 1},${c}`, `${r + 1},${c}`, `${r},${c - 1}`, `${r},${c + 1}`].filter((n) => grid[n]);
  };
  const reach = (fromTypes) => {
    const seen = new Set(keys.filter((k) => fromTypes.includes(grid[k].type)));
    const queue = [...seen];
    while (queue.length) {
      const k = queue.shift();
      for (const n of neigh(k)) if (!seen.has(n)) { seen.add(n); queue.push(n); }
    }
    return seen;
  };
  const fromSilo = reach(["silo"]);
  const fedRoasters = new Set(keys.filter((k) => grid[k].type === "roaster" && fromSilo.has(k)));
  const fedMegas = new Set(keys.filter((k) => grid[k].type === "mega" && fromSilo.has(k)));
  const allFed = new Set([...fedRoasters, ...fedMegas]);
  const fromFed = allFed.size
    ? (() => {
        const seen = new Set(allFed);
        const queue = [...seen];
        while (queue.length) {
          const k = queue.shift();
          for (const n of neigh(k)) if (!seen.has(n)) { seen.add(n); queue.push(n); }
        }
        return seen;
      })()
    : new Set();
  const fedBaggers = new Set(keys.filter((k) => grid[k].type === "bagger" && fromFed.has(k)));
  const fedMixers = new Set(keys.filter((k) => grid[k].type === "mixer" && fromFed.has(k)));
  return { fromSilo, fedRoasters, fedMegas, fedBaggers, fedMixers };
}

function beanColor(T) {
  const stops = [
    [95, [124, 165, 80]], [150, [206, 190, 120]], [170, [190, 140, 85]],
    [196, [138, 90, 53]], [212, [90, 56, 32]], [226, [50, 32, 20]], [240, [20, 13, 8]],
  ];
  if (T < stops[0][0]) return `rgb(${stops[0][1].join(",")})`;
  if (T > stops[stops.length - 1][0]) return `rgb(${stops[stops.length - 1][1].join(",")})`;
  let a = stops[0], b = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++)
    if (T >= stops[i][0] && T <= stops[i + 1][0]) { a = stops[i]; b = stops[i + 1]; break; }
  const t = (T - a[0]) / (b[0] - a[0] || 1);
  const c = a[1].map((v, i) => Math.round(v + (b[1][i] - v) * t));
  return `rgb(${c.join(",")})`;
}

// ————— Kit de sons (WebAudio) : des "plops" ronds et feutrés, pas de bips —————
let audioCtx = null;
function ctx() {
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
// Sinus avec glissando + filtre passe-bas : son de bulle, doux pour l'oreille
function plop(f0, f1, dur, vol, delay = 0, gainMax = 0.05) {
  if (vol <= 0) return;
  try {
    const ac = ctx();
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator(), g = ac.createGain(), flt = ac.createBiquadFilter();
    o.type = "sine";
    o.frequency.setValueAtTime(f0, t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(40, f1), t0 + dur);
    flt.type = "lowpass"; flt.frequency.value = 1400; flt.Q.value = 0.4;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(gainMax * (vol / 100), t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(flt); flt.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + dur + 0.05);
  } catch { /* silencieux */ }
}
// Petit claquement organique (bruit filtré) pour le crack des grains
function crackle(vol) {
  if (vol <= 0) return;
  try {
    const ac = ctx();
    const t0 = ac.currentTime;
    const len = Math.floor(ac.sampleRate * 0.05);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    const src = ac.createBufferSource(); src.buffer = buf;
    const flt = ac.createBiquadFilter(); flt.type = "bandpass"; flt.frequency.value = 2100; flt.Q.value = 0.9;
    const g = ac.createGain(); g.gain.value = 0.06 * (vol / 100);
    src.connect(flt); flt.connect(g); g.connect(ac.destination);
    src.start(t0);
  } catch { /* silencieux */ }
}

function MameMameSaisons() {
  // Écrans : title | game | draft | runEnd | meta | options | saves | credits
  const [screen, setScreen] = useState("title");
  const [meta, setMeta] = useState(DEFAULT_META);
  const [metaLoaded, setMetaLoaded] = useState(false);
  const [hasAuto, setHasAuto] = useState(false);
  const [slotsInfo, setSlotsInfo] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [overlay, setOverlay] = useState(null); // "options" | "saves" | null : pop-ups qui n'interrompent pas la partie
  const pausedRef = useRef(false);
  const [draftChoices, setDraftChoices] = useState([]);
  const [runResult, setRunResult] = useState(null);

  // ————— État du run —————
  const [tab, setTab] = useState("market");
  const [money, setMoney] = useState(120);
  const [rep, setRep] = useState(2.5);
  const [day, setDay] = useState(1);
  const [prices, setPrices] = useState({});
  const [green, setGreen] = useState({});
  const [roasted, setRoasted] = useState([]);
  const [orders, setOrders] = useState([]);
  const [gear, setGear] = useState({ programmer: false, roaster2: false });
  const [factoryGrid, setFactoryGrid] = useState({}); // { "r,c": { type } }
  const [buildSel, setBuildSel] = useState(null); // machine sélectionnée dans la palette, ou "remove"
  const [drag, setDrag] = useState(null); // { type, fromKey, sx, sy, x, y, moved }
  const [buildMode, setBuildMode] = useState(false);
  const gridRef = useRef(null);
  const [profiles, setProfiles] = useState({});
  const [relics, setRelics] = useState({}); // { id: niveau }
  const [served, setServed] = useState(0);
  const [boss, setBoss] = useState(null);
  const [bossesBeaten, setBossesBeaten] = useState(0);
  const [flashOffer, setFlashOffer] = useState(null);
  const [loan, setLoan] = useState(null); // { debt, dueIn }
  const [bestLot, setBestLot] = useState(null); // meilleure torréf manuelle du run (Percolateur temporel)
  const [gaufro, setGaufro] = useState(null); // { trust, auto: {refill, sell}, msg, unread }
  const [gaufroOpen, setGaufroOpen] = useState(false);
  const [era, setEra] = useState(1); // 1 = artisan, 2 = industriel, 3 = cosmique
  const [spec, setSpec] = useState(null); // { amount } — spéculation en bourse (Ère 2)
  const [exos, setExos] = useState([]); // exo-grains découverts au télescope (Ère 3)
  const [scannedToday, setScannedToday] = useState(false);
  const [stellar, setStellar] = useState(null); // { star: 0|1|2, orbit: "proche"|"ideale"|"lointaine" } — anneau stellaire
  const [vacuumMode, setVacuumMode] = useState(false); // torréfaction dans le vide (Ère 3)
  const [batchesToday, setBatchesToday] = useState(0);
  const [blendCount, setBlendCount] = useState(1);
  const [blendQty, setBlendQty] = useState({});
  const [factoryLog, setFactoryLog] = useState(null);
  const [toast, setToast] = useState(null);
  const [session, setSession] = useState(null);
  const gasRef = useRef(60);
  const [gasUI, setGasUI] = useState(60);
  const lotId = useRef(1);
  const oid = useRef(1);

  const opts = meta.options;
  const rl = (rid) => relics[rid] || 0; // niveau de relique (0 = absente)
  const mLvl = (id) => meta.upgrades[id] || 0;
  const cpHas = (id) => !!meta.cpUnlocks[id];
  const activeOrigins = [
    ...BASE_ORIGINS,
    ...(mLvl("geisha") ? [GEISHA] : []),
    ...(era >= 3 ? SPACE_ORIGINS : []),
    ...exos,
  ];
  const dailyBatchCap = 3 + (gear.roaster2 ? 3 : 0) + rl("doublecharge") + mLvl("cap");
  const COLS = era === 3 ? 7 : era === 2 ? 6 : GRID_COLS;
  const ROWS = era === 3 ? 10 : era === 2 ? 9 : GRID_ROWS;

  const say = (msg) => {
    setToast(msg);
    clearTimeout(say._t);
    say._t = setTimeout(() => setToast(null), 2800);
  };

  // ————— Chargement initial —————
  useEffect(() => {
    (async () => {
      const m = await storageGet("mmr-meta");
      if (m) setMeta({ ...DEFAULT_META, ...m, cpUnlocks: m.cpUnlocks || {}, options: { ...DEFAULT_META.options, ...(m.options || {}) } });
      const auto = await storageGet("mmr-auto");
      setHasAuto(!!auto);
      setMetaLoaded(true);
    })();
  }, []);

  const saveMeta = (m) => { setMeta(m); storageSet("mmr-meta", m); };

  // ————— Sauvegarde / chargement du run —————
  const snapshot = () => ({
    v: 2, savedAt: Date.now(),
    money, rep, day, prices, green, roasted, orders, gear, profiles,
    relics, served, batchesToday, blendCount, lotN: lotId.current, oidN: oid.current,
    boss, bossesBeaten, flashOffer, loan, factoryGrid, bestLot, gaufro, era, spec, exos, scannedToday, stellar,
  });
  const loadSnapshot = (s) => {
    setMoney(s.money); setRep(s.rep); setDay(s.day); setPrices(s.prices);
    setGreen(s.green); setRoasted(s.roasted); setOrders(s.orders); setGear(s.gear);
    setProfiles(s.profiles);
    const rr = Array.isArray(s.relics) ? Object.fromEntries(s.relics.map((id) => [id, 1])) : (s.relics || {});
    setRelics(rr);
    setServed(s.served);
    setBatchesToday(s.batchesToday); setBlendCount(s.blendCount);
    setBoss(s.boss || null); setBossesBeaten(s.bossesBeaten || 0); setFlashOffer(s.flashOffer || null); setLoan(s.loan || null);
    setFactoryGrid(s.factoryGrid || {}); setBuildSel(null); setBuildMode(false); setBestLot(s.bestLot || null);
    setGaufro(s.gaufro || null); setGaufroOpen(false); setEra(s.era || 1); setSpec(s.spec || null);
    setExos(s.exos || []); setScannedToday(!!s.scannedToday); setStellar(s.stellar || null); setVacuumMode(false);
    lotId.current = s.lotN; oid.current = s.oidN;
    setSession(null); setBlendQty({}); setFactoryLog(null); setTab("market");
  };
  const autoSave = (snap) => { storageSet("mmr-auto", snap || snapshot()); setHasAuto(true); };

  // Auto-save continue : dès qu'un état du run change, on sauvegarde (débounce 800 ms).
  // Remplace les anciens appels ponctuels, qui pouvaient capturer un état périmé.
  useEffect(() => {
    if (!["game", "draft", "bossIntro", "eraUp", "transcend"].includes(screen)) return;
    const t = setTimeout(() => { storageSet("mmr-auto", snapshot()); setHasAuto(true); }, 800);
    return () => clearTimeout(t);
  }, [screen, money, rep, day, green, roasted, orders, gear, profiles, relics, served,
      batchesToday, blendCount, boss, bossesBeaten, flashOffer, loan, factoryGrid, bestLot, gaufro, era, spec, exos, scannedToday, stellar]);

  const refreshSlots = async () => {
    const infos = [];
    for (const key of ["mmr-slot-1", "mmr-slot-2", "mmr-slot-3", "mmr-auto"]) {
      infos.push({ key, data: await storageGet(key) });
    }
    setSlotsInfo(infos);
  };

  // ————— Génération —————
  const rollPrices = () => {
    const p = {};
    activeOrigins.forEach((o) => { p[o.id] = Math.max(4, Math.round(o.base * rnd(0.75, 1.35))); });
    return p;
  };

  const makeOrder = (d, forcePatience) => {
    const roll = Math.random();
    const want = roll < 0.55 ? pick(activeOrigins).id : roll < 0.85 ? null : "blend";
    const level = Math.floor(Math.random() * 3);
    const kg = d <= 4 ? pick([1, 1, 2, 2, 3]) : pick([2, 2, 3, 3, 4]);
    let perKg;
    if (want === "blend") perKg = 34;
    else if (want === null) perKg = 24;
    else perKg = activeOrigins.find((o) => o.id === want).base * 2.2 + 7;
    return {
      id: oid.current++, client: pick(CLIENTS), want, level, kg,
      pay: Math.round(kg * perKg * (1 + d * 0.05) * rnd(0.95, 1.15)),
      daysLeft: 2 + Math.floor(Math.random() * 3) + ((forcePatience !== undefined ? forcePatience : rl("patience") > 0) ? 1 : 0),
    };
  };

  const newRun = () => {
    lotId.current = 1; oid.current = 1;
    const startMoney = 120 + mLvl("cash") * 50;
    const startRep = 2.5 + mLvl("rep") * 0.5;
    const startGreen = { bresil: 4 + mLvl("stock") * 2, ...(mLvl("fournisseur") ? { colombie: mLvl("fournisseur") * 2 } : {}) };
    setMoney(startMoney); setRep(startRep); setDay(1);
    setGreen(startGreen); setRoasted([]); setRelics({}); setServed(0);
    setBoss(null); setBossesBeaten(0); setFlashOffer(null); setLoan(null); setBestLot(null);
    setGaufro(cpHas("gaufromatic") ? { trust: 0, auto: {}, msg: { text: GAUFRO_FLAVOR[0][0] }, unread: true } : null);
    setGaufroOpen(false); setEra(1); setSpec(null);
    setExos([]); setScannedToday(false); setStellar(null); setVacuumMode(false);
    setGear({ programmer: mLvl("equipe") > 0, roaster2: false });
    setFactoryGrid({}); setBuildSel(null); setBuildMode(false);
    setProfiles({}); setBatchesToday(0); setBlendCount(1); setBlendQty({});
    setSession(null); setFactoryLog(null); setTab("market");
    setPrices((() => { const p = {}; activeOrigins.forEach((o) => { p[o.id] = Math.max(4, Math.round(o.base * rnd(0.75, 1.35))); }); return p; })());
    setOrders([]);
    // deux commandes de départ, générées avec compteur propre
    setTimeout(() => setOrders(Array.from({ length: 2 + mLvl("carnet") }, () => makeOrder(1, false))), 0);
    setScreen("game");
  };

  // ————— Simulation de la courbe —————
  useEffect(() => { pausedRef.current = menuOpen || overlay !== null; }, [menuOpen, overlay]);

  useEffect(() => {
    if (!session || session.done) return;
    const iv = setInterval(() => {
      if (pausedRef.current) return; // partie en pause : la torréfaction attend sagement
      setSession((s) => {
        if (!s || s.done) return s;
        const dt = 0.1 * (opts.fastSim ? 1.5 : 1);
        const t = s.t + dt;
        let { beanT, envT, scorch, crashed } = s;
        const events = [...s.events];
        if (t < 2.5) {
          beanT = 190 - (190 - 95) * (t / 2.5);
          envT = 200;
        } else if (s.vacuum) {
          // Dans le vide : pas de convection, chauffe radiative pure — lente, douce, sans scorch
          const target = 140 + gasRef.current * 1.5; // jusqu'à 290 °C
          const inertia = 0.05 + rl("ceramique") * 0.006;
          envT += (target - envT) * inertia * (opts.fastSim ? 1.5 : 1);
          beanT += (envT - beanT) * 0.0040 * (opts.fastSim ? 1.5 : 1);
        } else {
          const target = gasTarget(gasRef.current);
          const inertia = 0.045 + rl("ceramique") * 0.006;
          envT += (target - envT) * inertia * (opts.fastSim ? 1.5 : 1);
          beanT += (envT - beanT) * 0.0048 * (opts.fastSim ? 1.5 : 1);
          if (envT > 262 && beanT < 155) scorch += 0.35;
        }
        const prev = s.curve[s.curve.length - 1];
        const ror = prev ? (beanT - prev.T) / dt : 0;
        if (t > 4 && ror < -0.05 && !crashed) { crashed = true; events.push({ t, label: "Crash de RoR" }); }
        let cracked = s.cracked, fcTime = s.fcTime, secondCrack = s.secondCrack;
        if (!cracked && beanT >= FC_TEMP && t > 3) {
          cracked = true; fcTime = t; events.push({ t, label: "Premier crack" });
          SFX.crack(opts.sfx);
          if (rl("esprit")) { setMoney((m) => m + rl("esprit") * 3); }
        }
        if (cracked && !secondCrack && beanT >= SC_TEMP) { secondCrack = true; events.push({ t, label: "Second crack" }); SFX.crack(opts.sfx); }
        const curve = [...s.curve, { t, T: beanT }];
        if (beanT >= BURNT_TEMP) {
          if (rl("lg_midas")) { const g = Math.round(s.kg * 8); setMoney((m) => m + g); }
          return { ...s, t, beanT, envT, ror, scorch, crashed, cracked, fcTime, secondCrack, curve, events, done: "burnt" };
        }
        if (t >= 50) return { ...s, t, beanT, envT, ror, scorch, crashed, cracked, fcTime, secondCrack, curve, events, done: "timeout" };
        return { ...s, t, beanT, envT, ror, scorch, crashed, cracked, fcTime, secondCrack, curve, events };
      });
    }, 100);
    return () => clearInterval(iv);
  }, [session?.startedAt, session?.done, opts.fastSim]);

  const startRoast = (originId, kg) => {
    if ((green[originId] || 0) < kg) return;
    if (batchesToday >= dailyBatchCap) { say("Capacité du jour atteinte. Passe au jour suivant."); return; }
    setGreen((g) => ({ ...g, [originId]: r1(g[originId] - kg) }));
    setBatchesToday((n) => n + 1);
    gasRef.current = 60; setGasUI(60);
    setSession({
      originId, kg, vacuum: era >= 3 && vacuumMode, t: 0, beanT: 190, envT: 200, ror: 0, scorch: 0,
      crashed: false, cracked: false, fcTime: null, secondCrack: false,
      curve: [{ t: 0, T: 190 }], events: [], done: null, startedAt: Date.now(),
    });
    setTab("roast");
  };

  const finishRoast = (s, endT) => {
    if (!s.cracked) return { fail: "Débarqué avant le premier crack : le lot est sous-développé." };
    const li = LEVELS.findIndex((L) => endT >= L.lo && endT < L.hi);
    if (li === -1 && endT >= LEVELS[2].hi) return { fail: "Beaucoup trop poussé, le lot part au compost." };
    const level = li === -1 ? 0 : li;
    const L = LEVELS[level];
    let q = 100;
    const precCoef = (s.vacuum ? 0.7 : 1) * (1 - rl("sonde") * 0.12);
    q -= Math.abs(endT - L.target) * 4 * precCoef;
    const dtr = (s.t - s.fcTime) / s.t;
    if (dtr < 0.08 || dtr > 0.35) q -= 18;
    else if (dtr < 0.14 || dtr > 0.26) q -= 8;
    if (s.crashed) q -= 10;
    q -= Math.min(20, s.scorch);
    q += mLvl("qual") * 2;
    if (s.vacuum) q += 3;
    const o = activeOrigins.find((x) => x.id === s.originId);
    if (o?.qBonus) q += o.qBonus;
    q = clamp(Math.round(q), 25, 100);
    let outKg = s.kg * 0.85;
    let quantum = false;
    if (Math.random() < rl("quantique") * 0.1) { outKg += 0.5; quantum = true; }
    const lot = {
      id: lotId.current++, origin: s.originId, label: o.name, notes: o.notes,
      levelIdx: level, kg: r1(outKg), quality: q,
    };
    return { lot, dtr, quantum };
  };

  const dropBeans = () => {
    setSession((s) => {
      if (!s || s.done) return s;
      const res = finishRoast(s, s.beanT);
      if (res.fail) {
        if (rl("lg_midas")) { const g = Math.round(s.kg * 8); setMoney((m) => m + g); say(`Charbon gourmet : lot raté vendu +${g} €.`); }
        return { ...s, done: "fail", failMsg: res.fail };
      }
      setRoasted((r) => [...r, res.lot]);
      setBestLot((b) => (!b || res.lot.quality > b.quality
        ? { origin: res.lot.origin, label: res.lot.label, notes: res.lot.notes, levelIdx: res.lot.levelIdx, quality: res.lot.quality }
        : b));
      if (boss?.type === "rival") {
        setBoss((b) => (b && b.type === "rival" && res.lot.quality > (b.best || 0) ? { ...b, best: res.lot.quality } : b));
      }
      SFX.drop(opts.sfx);
      return { ...s, done: "ok", result: res.lot, dtr: res.dtr };
    });
  };

  const saveProfile = (lot) => {
    setProfiles((p) => {
      const cur = p[lot.levelIdx];
      if (cur && cur >= lot.quality) { say("Un meilleur profil existe déjà pour ce niveau."); return p; }
      say(`Profil ${LEVELS[lot.levelIdx].name} enregistré (qualité ${lot.quality}).`);
      return { ...p, [lot.levelIdx]: lot.quality };
    });
  };

  const autoRoast = (originId, levelIdx) => {
    if ((green[originId] || 0) < 2) { say("Il faut au moins 2 kg de vert."); return; }
    if (batchesToday >= dailyBatchCap) { say("Capacité du jour atteinte."); return; }
    const malus = Math.max(1, 4 - rl("express"));
    const q = clamp(profiles[levelIdx] - malus, 25, 100);
    const o = activeOrigins.find((x) => x.id === originId);
    setGreen((g) => ({ ...g, [originId]: r1(g[originId] - 2) }));
    setBatchesToday((n) => n + 1);
    const qBonus = Math.random() < rl("quantique") * 0.1 ? 0.5 : 0;
    setRoasted((r) => [...r, {
      id: lotId.current++, origin: originId, label: o.name, notes: o.notes,
      levelIdx, kg: r1(2 * 0.85 + qBonus), quality: q,
    }]);
    say(`Fournée auto : ${r1(2 * 0.85 + qBonus)} kg de ${o.name}, ${LEVELS[levelIdx].name}, qualité ${q}.${qBonus ? " Le grain quantique a encore frappé." : ""}`);
  };

  const greenPrice = (o) => {
    let p = (rl("lg_monopole") ? o.base * 0.7 : prices[o.id]) * (1 - rl("mainverte") * 0.07);
    if (flashOffer?.type === "promo" && flashOffer.origin === o.id) p *= 0.5;
    if (boss?.type === "baron") p *= 3;
    return Math.max(2, Math.round(p));
  };

  const buyGreen = (o) => {
    const price = greenPrice(o);
    if (money < price) { SFX.error(opts.sfx); say("Pas assez de trésorerie."); return; }
    setMoney((m) => m - price);
    const bonus = (rl("lg_serre") ? 1 : 0) + (Math.random() < rl("sansfond") * 0.1 ? 1 : 0);
    setGreen((g) => ({ ...g, [o.id]: r1((g[o.id] || 0) + 1 + bonus) }));
    if (bonus) say("Sac sans fond : un kilo offert s'est glissé dans la commande.");
  };

  const buyGear = (key, price, label) => {
    if (money < price) { SFX.error(opts.sfx); say("Pas assez de trésorerie."); return; }
    setMoney((m) => m - price);
    setGear((g) => ({ ...g, [key]: true }));
    say(`${label} : c'est installé.`);
  };


  const takeLoan = (amount) => {
    if (loan) { SFX.error(opts.sfx); say("Un prêt est déjà en cours."); return; }
    const debt = Math.round(amount * 1.3);
    setLoan({ debt, dueIn: 5 });
    setMoney((m) => m + amount);
    SFX.coin(opts.sfx);
    say(`Prêt de ${amount} € accordé. À rembourser : ${debt} € sous 5 jours.`);
  };

  const repayLoan = () => {
    if (!loan) return;
    if (money < loan.debt) { SFX.error(opts.sfx); say("Pas assez pour solder le prêt."); return; }
    setMoney((m) => m - loan.debt);
    setLoan(null);
    SFX.success(opts.sfx);
    say("Prêt remboursé. La banquière te fait presque un sourire.");
  };

  const directPrice = (lot) => {
    const base = lot.origin === "blend" ? 15 + lot.quality * 0.12 : 11 + lot.quality * 0.1;
    return Math.round(base * (1 + rl("grossiste") * 0.08 + mLvl("etiquettes") * 0.05) * (flashOffer?.type === "rush" ? 2 : 1));
  };

  const lotMatches = (lot, order) => {
    if (order.level !== null && lot.levelIdx !== order.level && !rl("lg_super")) return false;
    if (lot.kg < order.kg - 0.001) return false;
    if (order.minQ && lot.quality < order.minQ) return false;
    if (order.want === "blend") return lot.origin === "blend";
    if (order.want === null) return true;
    return lot.origin === order.want;
  };

  const fulfill = (order) => {
    const candidates = roasted.filter((l) => lotMatches(l, order)).sort((a, b) => b.quality - a.quality);
    if (!candidates.length) return;
    const lot = candidates[0];
    const gain = Math.round(order.pay * (0.55 + (lot.quality / 100) * 0.5) * (1 + rl("pourboire") * 0.05));
    setRoasted((r) => r.map((l) => (l.id === lot.id ? { ...l, kg: r1(l.kg - order.kg) } : l)).filter((l) => l.kg > 0.05));
    setOrders((os) => os.filter((o) => o.id !== order.id));
    setMoney((m) => m + gain);
    setRep((v) => clamp(r1(v + (lot.quality >= 80 ? 0.2 : 0.1)), 0, 5));
    setServed((n) => n + 1);
    SFX.coin(opts.sfx);
    say(`${order.client.n} repart avec son café. +${gain} €`);
  };

  const sellDirect = (lot, all) => {
    const kg = all ? lot.kg : Math.min(1, lot.kg);
    const gain = Math.round(directPrice(lot) * kg);
    setRoasted((r) => r.map((l) => (l.id === lot.id ? { ...l, kg: r1(l.kg - kg) } : l)).filter((l) => l.kg > 0.05));
    setMoney((m) => m + gain);
    say(`Vente directe : ${r1(kg)} kg de ${lot.label}. +${gain} €`);
  };

  // ————— Assemblage —————
  const assemblyParts = () =>
    roasted.map((l) => ({ lot: l, kg: Math.min(blendQty[l.id] || 0, l.kg) })).filter((p) => p.kg > 0.05);

  const previewAssembly = (parts) => {
    if (parts.length < 2) return null;
    const tot = parts.reduce((s, p) => s + p.kg, 0);
    if (tot < 0.9) return null;
    const levelFloat = parts.reduce((s, p) => s + p.lot.levelIdx * p.kg, 0) / tot;
    const level = clamp(Math.round(levelFloat), 0, 2);
    const spread = Math.max(...parts.map((p) => p.lot.levelIdx)) - Math.min(...parts.map((p) => p.lot.levelIdx));
    const baseQ = parts.reduce((s, p) => s + p.lot.quality * p.kg, 0) / tot;
    const origins = [...new Set(parts.map((p) => p.lot.origin))];
    const isPure = origins.length === 1 && origins[0] !== "blend";
    const byLabel = {};
    parts.forEach((p) => { byLabel[p.lot.label] = (byLabel[p.lot.label] || 0) + p.kg; });
    const compo = Object.entries(byLabel).sort((a, b) => b[1] - a[1])
      .map(([label, kg]) => ({ label, pct: Math.round((kg / tot) * 100) }));
    const notes = [];
    let q = baseQ;
    if (isPure) {
      if (spread >= 2) { q -= 6; notes.push("torréfactions trop éloignées (−6)"); }
      else if (spread === 1) notes.push("niveaux voisins mélangés");
    } else {
      const harmony = compo.length >= 3 ? 6 : 4;
      q += harmony; notes.push(`harmonie d'assemblage (+${harmony})`);
      const maxShare = Math.max(...compo.map((c) => c.pct));
      if (maxShare <= 70) { q += 3; notes.push("composition équilibrée (+3)"); }
      if (spread >= 2) { q -= 6; notes.push("Claire et Foncée dans le même sac (−6)"); }
      if (rl("palais")) { q += rl("palais"); notes.push(`Palais absolu (+${rl("palais")})`); }
    }
    q = clamp(Math.round(q), 25, 100);
    return { tot: r1(tot), level, levelFloat, spread, isPure, compo, q, notes, originId: isPure ? origins[0] : "blend" };
  };

  const makeAssembly = () => {
    const parts = assemblyParts();
    const pv = previewAssembly(parts);
    if (!pv) return;
    setRoasted((r) => {
      const used = {};
      parts.forEach((p) => { used[p.lot.id] = p.kg; });
      const remaining = r.map((l) => (used[l.id] ? { ...l, kg: r1(l.kg - used[l.id]) } : l)).filter((l) => l.kg > 0.05);
      let newLot;
      if (pv.isPure) {
        const o = activeOrigins.find((x) => x.id === pv.originId);
        newLot = { id: lotId.current++, origin: o.id, label: o.name, notes: o.notes, levelIdx: pv.level, kg: pv.tot, quality: pv.q };
      } else {
        const dominant = pv.compo[0].label.replace(/^Blend /, "");
        newLot = {
          id: lotId.current++, origin: "blend", label: `Blend ${dominant} n°${blendCount}`,
          notes: pv.compo.map((c) => `${c.pct} % ${c.label}`).join(", "), levelIdx: pv.level, kg: pv.tot, quality: pv.q,
        };
        setBlendCount((n) => n + 1);
      }
      say(pv.isPure
        ? `Lots assemblés : ${newLot.kg} kg de ${newLot.label} pur origine, ${LEVELS[newLot.levelIdx].name}, qualité ${newLot.quality}.`
        : `${newLot.label} créé : ${LEVELS[newLot.levelIdx].name}, qualité ${newLot.quality}.`);
      return [...remaining, newLot];
    });
    setBlendQty({});
  };

  // ————— Usine : production quotidienne selon la grille —————
  const removeAt = (key) => {
    const m = factoryGrid[key];
    if (!m) return;
    const refund = Math.floor(MACHINES[m.type].cost / 2);
    setFactoryGrid((g) => { const n = { ...g }; delete n[key]; return n; });
    setMoney((mo) => mo + refund);
    SFX.pop(opts.sfx);
    say(`${MACHINES[m.type].name} démontée (+${refund} € récupérés).`);
  };

  const placeType = (type, key) => {
    if (factoryGrid[key]) { SFX.error(opts.sfx); say("Case occupée."); return; }
    const cost = MACHINES[type].cost;
    if (money < cost) { SFX.error(opts.sfx); say("Pas assez de trésorerie."); return; }
    setMoney((m) => m - cost);
    setFactoryGrid((g) => ({ ...g, [key]: { type } }));
    SFX.pop(opts.sfx);
  };

  const moveMachine = (fromKey, toKey) => {
    if (fromKey === toKey) return;
    if (factoryGrid[toKey]) { SFX.error(opts.sfx); return; }
    setFactoryGrid((g) => {
      const n = { ...g };
      n[toKey] = n[fromKey];
      delete n[fromKey];
      return n;
    });
    SFX.pop(opts.sfx);
  };

  const cellAtPoint = (x, y) => {
    const el = gridRef.current;
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) return null;
    const c = clamp(Math.floor(((x - rect.left) / rect.width) * COLS), 0, COLS - 1);
    const r = clamp(Math.floor(((y - rect.top) / rect.height) * ROWS), 0, ROWS - 1);
    return `${r},${c}`;
  };

  const startDrag = (e, type, fromKey, paletteTap) => {
    e.preventDefault();
    setDrag({ type, fromKey: fromKey || null, paletteTap: !!paletteTap, sx: e.clientX, sy: e.clientY, x: e.clientX, y: e.clientY, moved: false });
  };

  useEffect(() => {
    if (!drag) return;
    const move = (e) => {
      setDrag((d) => d && {
        ...d, x: e.clientX, y: e.clientY,
        moved: d.moved || Math.hypot(e.clientX - d.sx, e.clientY - d.sy) > 8,
      });
    };
    const up = (e) => {
      const cell = cellAtPoint(e.clientX, e.clientY);
      setDrag((d) => {
        if (!d) return null;
        if (!d.moved) {
          // simple tap
          if (d.fromKey) {
            if (buildSel === "remove") removeAt(d.fromKey);
          } else if (d.paletteTap) {
            SFX.click(opts.sfx);
            setBuildSel((b) => (b === d.type ? null : d.type));
          }
        } else if (cell) {
          if (factoryGrid[cell]) { if (cell !== d.fromKey) SFX.error(opts.sfx); }
          else if (d.fromKey) moveMachine(d.fromKey, cell);
          else if (d.type) placeType(d.type, cell);
        }
        return null;
      });
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    return () => { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
  }, [drag !== null, buildSel, buildMode, factoryGrid, money]);

  // Réassort : achète du vert au moins cher jusqu'à couvrir la capacité de l'usine
  const computeRefill = (curGreen, curMoney) => {
    const flow = computeFlow(factoryGrid);
    const cap = flow.fedRoasters.size * 3 + flow.fedMegas.size * 12;
    const total = activeOrigins.reduce((t, o) => t + (curGreen[o.id] || 0), 0);
    let need = Math.ceil(cap - total);
    const g = { ...curGreen };
    let m = curMoney, bought = 0, spent = 0;
    if (need <= 0) return { green: g, money: m, bought, spent, cap };
    const sorted = [...activeOrigins].sort((a, b) => greenPrice(a) - greenPrice(b));
    while (need > 0) {
      const o = sorted[0];
      const price = greenPrice(o);
      if (m < price) break;
      m -= price; spent += price;
      g[o.id] = r1((g[o.id] || 0) + 1);
      need -= 1; bought += 1;
    }
    return { green: g, money: m, bought, spent, cap };
  };

  const refillNow = () => {
    const res = computeRefill(green, money);
    if (res.cap <= 0) { SFX.error(opts.sfx); say("Aucun torréfacteur d'usine alimenté : rien à remplir."); return; }
    if (res.bought === 0) {
      if (res.spent === 0 && activeOrigins.reduce((t, o) => t + (green[o.id] || 0), 0) >= res.cap) say("Le stock couvre déjà la capacité de demain.");
      else { SFX.error(opts.sfx); say("Pas assez de trésorerie pour le réassort."); }
      return;
    }
    setGreen(res.green); setMoney(res.money);
    SFX.coin(opts.sfx);
    say(`Réassort : ${res.bought} kg de vert au meilleur prix (−${res.spent} €).`);
  };

  // Prévision de production (calcul à blanc, affiché en direct dans l'usine)
  const forecastFactory = () => {
    const flow = computeFlow(factoryGrid);
    const nRoasters = flow.fedRoasters.size + flow.fedMegas.size;
    const capIn = flow.fedRoasters.size * 3 + flow.fedMegas.size * 12;
    if (!nRoasters) return { ok: false, why: "aucun torréfacteur relié à un silo" };
    const bestProfile = Object.values(profiles).length ? Math.max(...Object.values(profiles)) : null;
    if (!bestProfile) return { ok: false, why: "aucun profil de torréfaction enregistré" };
    const totalGreen = activeOrigins.reduce((t, o) => t + (green[o.id] || 0), 0);
    if (totalGreen < 0.05) return { ok: false, why: "plus de café vert en stock" };
    const used = Math.min(capIn, totalGreen);
    const produced = r1(used * 0.85);
    const q = clamp(bestProfile - 6, 25, 100);
    const mixed = cpHas("melangeur") && flow.fedMixers.size > 0;
    const outQ = mixed ? clamp(q + 4, 25, 100) : q;
    const capSell = flow.fedBaggers.size * (4 + rl("turbo"));
    const sold = Math.min(produced, capSell);
    const perKg = mixed ? 19 + outQ * 0.15 : 16 + outQ * 0.14;
    return { ok: true, used, produced, sold, gain: Math.round(sold * perKg), rest: r1(produced - sold), mixed, totalGreen };
  };

  const runFactory = (curGreen) => {
    const flow = computeFlow(factoryGrid);
    const nRoasters = flow.fedRoasters.size + flow.fedMegas.size;
    const capIn = flow.fedRoasters.size * 3 + flow.fedMegas.size * 12;
    const nBaggers = flow.fedBaggers.size;
    if (!nRoasters) {
      const hasMachines = Object.keys(factoryGrid).length > 0;
      return { log: hasMachines ? "Usine : aucun torréfacteur relié à un silo, la chaîne est restée muette." : null, green: curGreen, gain: 0, lots: [] };
    }
    const bestProfile = Object.values(profiles).length ? Math.max(...Object.values(profiles)) : null;
    if (!bestProfile) return { log: "Usine à l'arrêt : aucun profil de torréfaction enregistré.", green: curGreen, gain: 0, lots: [] };
    const capacity = capIn;
    const stocked = activeOrigins.filter((o) => (curGreen[o.id] || 0) > 0.05).sort((a, b) => prices[a.id] - prices[b.id]);
    if (!stocked.length) return { log: "Usine à l'arrêt : plus de café vert en stock.", green: curGreen, gain: 0, lots: [] };
    let toUse = capacity;
    const newGreen = { ...curGreen };
    let producedKg = 0;
    const q = clamp(bestProfile - 6, 25, 100);
    const rawLots = [];
    for (const o of stocked) {
      if (toUse <= 0) break;
      const take = Math.min(toUse, newGreen[o.id]);
      newGreen[o.id] = r1(newGreen[o.id] - take);
      toUse -= take;
      producedKg += take * 0.85;
      rawLots.push({ origin: o.id, label: o.name, notes: o.notes, kg: r1(take * 0.85) });
    }
    // Mélangeur relié : la production devient un blend maison (+4 qualité)
    const mixed = cpHas("melangeur") && flow.fedMixers.size > 0 && rawLots.length > 0;
    const outQ = mixed ? clamp(q + 4, 25, 100) : q;
    const toLots = (kgTotal) => {
      if (kgTotal <= 0.05) return [];
      if (mixed) {
        const compo = rawLots.map((l) => `${Math.round((l.kg / producedKg) * 100)} % ${l.label}`).join(", ");
        return [{ id: lotId.current++, origin: "blend", label: `Blend d'usine`, notes: compo, levelIdx: 1, quality: outQ, kg: r1(kgTotal) }];
      }
      return rawLots.map((l) => ({ ...l, id: lotId.current++, levelIdx: 1, quality: outQ, kg: r1((l.kg / producedKg) * kgTotal) }));
    };
    if (nBaggers) {
      const cap = nBaggers * (4 + rl("turbo"));
      const kgSold = Math.min(producedKg, cap);
      const rest = producedKg - kgSold;
      const perKg = mixed ? 19 + outQ * 0.15 : 16 + outQ * 0.14;
      const gain = Math.round(kgSold * perKg);
      return {
        log: `Usine : ${r1(producedKg)} kg torréfiés${mixed ? " et mélangés en blend" : ""}, ${r1(kgSold)} kg ensachés et vendus (+${gain} €).`,
        green: newGreen, gain, lots: toLots(rest),
      };
    }
    return {
      log: `Usine : ${r1(producedKg)} kg torréfiés${mixed ? " et mélangés en blend" : ""}, envoyés au stock — pose une ensacheuse pour vendre en direct.`,
      green: newGreen, gain: 0, lots: toLots(producedKg),
    };
  };

  // ————— Fin de journée / structure du run infini —————
  const genBoss = (cycle) => {
    const def = pick(BOSSES);
    const req = def.makeReq(cycle);
    return { type: def.type, name: def.name, intro: def.intro, req, desc: def.desc(req), cycle, best: 0 };
  };

  const genFlash = (d) => {
    const def = pick(FLASH_OFFERS);
    if (def.type === "promo") {
      const o = pick(activeOrigins);
      return { type: "promo", origin: o.id, originName: o.name, punch: def.punch, sub: def.sub, seen: false };
    }
    if (def.type === "vip") {
      const cands = activeOrigins.filter((o) => o.base >= 14);
      const o = pick(cands.length ? cands : activeOrigins);
      const kg = 2, minQ = 80;
      const order = {
        id: oid.current++, client: pick(CLIENTS), want: o.id, level: Math.floor(Math.random() * 3),
        kg, minQ, vip: true,
        pay: Math.round(kg * (o.base * 2.2 + 7) * 2.4 * (1 + d * 0.05)),
        daysLeft: 2,
      };
      return { type: "vip", order, punch: def.punch, sub: def.sub, originName: o.name, seen: false };
    }
    return { type: "rush", punch: def.punch, sub: def.sub, seen: false };
  };

  const endRun = (reason, finalMoney, finalRep) => {
    const score = Math.max(0, Math.round(finalMoney / 3 + finalRep * 40 + served * 12 + bossesBeaten * 60));
    let gb = Math.max(1, Math.round((finalMoney / 60 + finalRep * 2 + served * 0.5 + bossesBeaten * 6) * (1 + mLvl("livre") * 0.1)));
    if (finalMoney < 0) gb = Math.max(1, Math.floor(gb / 2));
    setRunResult({ reason, score, gb, money: finalMoney, rep: finalRep, served, days: day, bosses: bossesBeaten, bankrupt: finalMoney < 0 });
    const nm = { ...meta, gb: meta.gb + gb, seasons: meta.seasons + 1, bestScore: Math.max(meta.bestScore, score) };
    saveMeta(nm);
    storageSet("mmr-auto", null);
    setHasAuto(false);
    setScreen("runEnd");
  };

  const endDay = () => {
    if (session && !session.done) { say("Termine la fournée en cours d'abord."); return; }

    // 1) Évaluation du boss du jour, le cas échéant
    let workRoasted = roasted, workMoney = money, workRep = rep;
    let bossMsg = null, bossPassed = false;
    if (boss) {
      const r = boss.req;
      if (boss.type === "inspecteur") {
        const lot = roasted.filter((l) => l.quality >= r.q && l.kg >= r.kg).sort((a, b) => b.quality - a.quality)[0];
        if (lot) {
          workRoasted = roasted.map((l) => (l.id === lot.id ? { ...l, kg: r1(l.kg - r.kg) } : l)).filter((l) => l.kg > 0.05);
          workMoney += r.pay; workRep = clamp(r1(workRep + 0.5), 0, 5);
          bossPassed = true; bossMsg = `L'Inspecteur est conquis par ton ${lot.label} (Q${lot.quality}). +${r.pay} € et +0,5 de réputation.`;
        } else bossMsg = "Aucun lot à la hauteur pour l'Inspecteur Q-Grader. Verdict sans appel.";
      } else if (boss.type === "baron") {
        if (workMoney >= r.ransom) {
          workMoney -= r.ransom;
          bossPassed = true; bossMsg = `Tribut de ${r.ransom} € versé au Baron. Il repart… pour l'instant.`;
        } else bossMsg = `Impossible de réunir les ${r.ransom} € exigés par le Baron du Vert.`;
      } else if (boss.type === "monstre") {
        let pool = [...roasted]; let ok = true;
        for (const li of [0, 1, 2]) {
          const lot = pool.filter((l) => l.levelIdx === li && l.quality >= r.q && l.kg >= r.kgEach).sort((a, b) => b.quality - a.quality)[0];
          if (!lot) { ok = false; break; }
          pool = pool.map((l) => (l.id === lot.id ? { ...l, kg: r1(l.kg - r.kgEach) } : l));
        }
        if (ok) {
          workRoasted = pool.filter((l) => l.kg > 0.05);
          workMoney += r.pay; workRep = clamp(r1(workRep + 0.5), 0, 5);
          bossPassed = true; bossMsg = `Mochi a dévoré toute la gamme en ronronnant. +${r.pay} € !`;
        } else bossMsg = `Il manquait un niveau de torréfaction digne de Mochi (chaque niveau en ${r.kgEach} kg à Q${r.q}+).`;
      } else if (boss.type === "rival") {
        if ((boss.best || 0) >= r.score) {
          workMoney += r.pay; workRep = clamp(r1(workRep + 0.5), 0, 5);
          bossPassed = true; bossMsg = `Duel remporté ${boss.best} contre ${r.score} requis ! Louis remballe son food-truck. +${r.pay} €.`;
        } else bossMsg = `Louis l'emporte (ta meilleure torréf du jour : ${boss.best || 0}, il fallait ${r.score}).`;
      }
      if (!bossPassed) { endRun(bossMsg, workMoney, workRep); return; }
    }

    // 2) Journée normale
    // Gaufromatic : réassort nocturne délégué (avant que l'usine consomme)
    let nightGreen = green, nightMoney = workMoney, gaufroNight = [];
    if (gaufro?.auto?.refill) {
      const rr = computeRefill(green, workMoney);
      if (rr.bought > 0) {
        nightGreen = rr.green; nightMoney = rr.money;
        gaufroNight.push(`réassort de ${rr.bought} kg (−${rr.spent} €)`);
      }
    }
    workMoney = nightMoney;
    let stellarMsg = null;
    if (era >= 3 && stellar) {
      const totalG = activeOrigins.reduce((t, o) => t + (nightGreen[o.id] || 0), 0);
      const used = Math.min(40, totalG);
      if (used > 0.05) {
        const sq = stellar.orbit === "ideale" ? 78 : 65;
        const level = stellar.star;
        const g2 = { ...nightGreen };
        let toUse = used;
        const lots = [];
        for (const o of activeOrigins) {
          if (toUse <= 0.05) break;
          const take = Math.min(toUse, g2[o.id] || 0);
          if (take <= 0.05) continue;
          g2[o.id] = r1(g2[o.id] - take);
          toUse -= take;
          lots.push({
            id: lotId.current++, origin: o.id, label: o.name, notes: o.notes,
            levelIdx: level, kg: r1(take * 0.85), quality: clamp(sq + (o.qBonus || 0), 25, 100),
          });
        }
        nightGreen = g2;
        setRoasted((r) => [...r, ...lots]);
        stellarMsg = `Anneau stellaire : ${r1(used)} kg cuits en orbite (${LEVELS[level].name}, ${stellar.orbit === "ideale" ? "orbite idéale" : "orbite " + stellar.orbit}).`;
      }
    }
    if (rl("lg_perco") && bestLot) {
      setRoasted((r) => [...r, { ...bestLot, id: lotId.current++, kg: 1.7 }]);
    }
    const fac = runFactory(nightGreen);
    setGreen(fac.green);
    let newRoasted = fac.lots.length ? [...workRoasted, ...fac.lots] : workRoasted;
    setFactoryLog(fac.log);

    let repLoss = 0;
    const kept = [];
    orders.forEach((o) => {
      if (o.daysLeft - 1 <= 0) repLoss += 0.3;
      else kept.push({ ...o, daysLeft: o.daysLeft - 1 });
    });
    const nNew = 1 + Math.floor(day / 3) + rl("bouche");
    const fresh = [];
    for (let i = 0; i < nNew && kept.length + fresh.length < 7; i++) fresh.push(makeOrder(day + 1));
    let newOrders = [...kept, ...fresh];

    if (gaufro?.auto?.sell) {
      const idle = newRoasted.filter((l) => !newOrders.some((o) => lotMatches(l, o)));
      if (idle.length) {
        let gain = 0;
        idle.forEach((l) => { gain += Math.round(directPrice(l) * l.kg); });
        newRoasted = newRoasted.filter((l) => !idle.some((x) => x.id === l.id));
        workMoney += gain;
        gaufroNight.push(`${idle.length} lot${idle.length > 1 ? "s" : ""} écoulé${idle.length > 1 ? "s" : ""} (+${gain} €)`);
      }
    }

    const charges = Math.max(3, (era === 3 ? 40 : era === 2 ? 20 : 8) + day - mLvl("assurance"));
    let specMsg = null;
    if (spec) {
      const mult = rnd(0.6, 1.6);
      const payout = Math.round(spec.amount * mult);
      workMoney += payout;
      specMsg = `Bourse : mise de ${spec.amount} € → ${payout} € (${mult >= 1 ? "+" : ""}${Math.round((mult - 1) * 100)} %).`;
      setSpec(null);
    }
    const income = rl("mecene") * 8 + fac.gain;
    const newMoney = workMoney - charges + income;
    const newRep = clamp(r1(workRep - (rl("lg_culte") ? 0 : repLoss)), 0, 5);

    // Échéance du prêt
    let finalMoney = newMoney;
    let newLoan = loan;
    let loanMsg = null;
    if (loan) {
      const dueIn = loan.dueIn - 1;
      if (dueIn <= 0) {
        if (finalMoney >= loan.debt) {
          finalMoney -= loan.debt;
          newLoan = null;
          loanMsg = `Prêt de ${loan.debt} € prélevé par la banque.`;
        } else {
          setRoasted(newRoasted); setMoney(finalMoney); setRep(newRep); setOrders(kept);
          endRun(`Prêt de ${loan.debt} € impayé : les huissiers embarquent le torréfacteur.`, finalMoney, newRep);
          return;
        }
      } else newLoan = { ...loan, dueIn };
    }
    setLoan(newLoan);

    setRoasted(newRoasted);
    setMoney(finalMoney);
    setRep(newRep);
    setPrices(rollPrices());
    setSession(null);
    setBatchesToday(0);
    let eraUp = false, eraUp3 = false;
    if (bossPassed) {
      const nb = bossesBeaten + 1;
      setBossesBeaten(nb);
      setBoss(null);
      if (era === 1 && cpHas("ere2") && nb >= 2) { setEra(2); eraUp = true; }
      else if (era === 2 && cpHas("ere3") && nb >= 4) { setEra(3); eraUp3 = true; }
    }
    setScannedToday(false);

    if (finalMoney < 0) {
      setOrders(newOrders);
      endRun("La trésorerie est à sec : les charges ont eu raison de la boutique.", finalMoney, newRep);
      return;
    }

    if (newRep <= 0) {
      setOrders(newOrders);
      endRun("Réputation ruinée : plus personne ne pousse la porte de la boutique.", finalMoney, newRep);
      return;
    }

    const nextDay = day + 1;
    setDay(nextDay);
    if (bossMsg) say(bossMsg);
    else if (stellarMsg) say(stellarMsg);
    else if (specMsg) say(specMsg);
    else if (loanMsg) say(loanMsg);
    else if (repLoss) say("Des commandes ont expiré. La réputation en prend un coup.");

    // 3) Boss à l'aube ou offre flash + draft
    if (nextDay % BOSS_EVERY === 0) {
      const b = genBoss(nextDay / BOSS_EVERY);
      setBoss(b);
      setFlashOffer(null);
      setOrders(newOrders);
      setScreen("bossIntro");
      return;
    }

    if (era === 2 && Math.random() < 0.35 && newOrders.length < 8) {
      const wantBlend = Math.random() < 0.4;
      const ckg = 8 + Math.floor(nextDay / 8);
      newOrders = [...newOrders, {
        id: oid.current++, client: { n: pick(CORP_CLIENTS), kind: pick(CLIENTS).kind }, corp: true,
        want: wantBlend ? "blend" : null, level: null, kg: ckg,
        pay: Math.round(ckg * (wantBlend ? 32 : 26) * (1 + nextDay * 0.04)),
        daysLeft: 3,
      }];
    }

    if (cpHas("contrats") && nextDay % 4 === 0) {
      const wantBlend = Math.random() < 0.35;
      const ckg = 4 + Math.floor(nextDay / 12);
      newOrders = [...newOrders, {
        id: oid.current++, client: pick(CLIENTS), want: wantBlend ? "blend" : null, level: null,
        kg: ckg, contract: true,
        pay: Math.round(ckg * (wantBlend ? 30 : 24) * (1 + nextDay * 0.04)),
        daysLeft: 4,
      }];
    }

    let offer = null;
    if (Math.random() < 0.4) {
      offer = genFlash(nextDay);
      if (offer.type === "vip") newOrders = [...newOrders, offer.order];
    }
    setFlashOffer(offer);
    setOrders(newOrders);
    if (eraUp) { setScreen("eraUp"); return; }
    if (eraUp3) { setScreen("eraUp3"); return; }
    if (cpHas("gaufromatic")) {
      const ng = gaufroSuggest({ nextDay, greenAfter: fac.green, ordersAfter: newOrders, bossTomorrow: (nextDay + 1) % BOSS_EVERY === 0 });
      if (ng) setGaufro({ ...ng, night: gaufroNight.length ? gaufroNight.join(", ") : null });
    }

    const pool = RELICS.filter((r) => (relics[r.id] || 0) < r.max);
    const choices = [];
    if (bossPassed && cpHas("legendaires")) {
      const lpool = LEGENDARIES.filter((lg) => !relics[lg.id]);
      if (lpool.length) {
        const lg = pick(lpool);
        choices.push({ id: lg.id, name: lg.name, desc: lg.desc, relic: true, legendary: true });
      }
    }
    const bag = [...pool];
    while (choices.length < 3 && bag.length) {
      const def = bag.splice(Math.floor(Math.random() * bag.length), 1)[0];
      const nextLvl = (relics[def.id] || 0) + 1;
      choices.push({ id: def.id, name: `${def.name} ${ROMAN[nextLvl]}`, desc: def.desc(nextLvl), relic: true });
    }
    const cbag = [...CONSUMABLES];
    while (choices.length < 3 && cbag.length) choices.push(cbag.splice(Math.floor(Math.random() * cbag.length), 1)[0]);
    setDraftChoices(choices);
    setScreen("draft");
  };

  const pickRelic = (item) => {
    if (item.consumable) {
      if (item.id === "c_cash") setMoney((m) => m + 25);
      if (item.id === "c_rep") setRep((v) => clamp(r1(v + 0.2), 0, 5));
      if (item.id === "c_green") setGreen((g) => ({ ...g, bresil: r1((g.bresil || 0) + 2) }));
      if (item.id === "c_etoile") setRep((v) => clamp(r1(v + 0.3), 0, 5));
    } else {
      setRelics((rs) => ({ ...rs, [item.id]: (rs[item.id] || 0) + 1 }));
    }
    setScreen("game");
    say(`${item.name} : c'est dans la poche.`);
  };

  const gaufroTier = (t) => (t >= 6 ? 2 : t >= 3 ? 1 : 0);

  const gaufroSuggest = (ctx) => {
    // ctx : { nextDay, greenAfter, ordersAfter, bossTomorrow }
    if (!cpHas("gaufromatic")) return null;
    const g = gaufro || { trust: 0, auto: {} };
    const flow = computeFlow(factoryGrid);
    const cap = flow.fedRoasters.size * 3 + flow.fedMegas.size * 12;
    const totalGreen = activeOrigins.reduce((t, o) => t + (ctx.greenAfter[o.id] || 0), 0);
    const idleKg = r1(roasted.filter((l) => !ctx.ordersAfter.some((o) => lotMatches(l, o))).reduce((t, l) => t + l.kg, 0));
    let msg;
    if (g.trust >= 5) {
      const plan = [];
      if (cap > 0 && totalGreen < cap) plan.push({ id: "refill", label: `Réassort complet du vert (${cap - Math.floor(totalGreen)} kg env.)` });
      if (idleKg >= 3) plan.push({ id: "sell", label: `Écouler ${idleKg} kg dormants au comptoir` });
      if (era === 2 && !spec && money >= 120) plan.push({ id: "spec", label: "Placer 50 € en bourse" });
      if (plan.length) {
        return { ...g, msg: { text: "Ordres du matin. Validation attendue.", plan }, unread: true };
      }
    }
    if (ctx.bossTomorrow) {
      msg = { text: "Un boss arrive demain. J'ai calculé tes chances. Je préfère ne pas les afficher : concentre-toi." };
    } else if (cap > 0 && totalGreen < cap && !g.auto.refill) {
      msg = { text: `Ton stock de vert (${r1(totalGreen)} kg) ne couvre pas la capacité de l'usine (${cap} kg). Je peux m'en occuper.`, action: "refill", canAuto: g.trust >= 2 };
    } else if (idleKg >= 4 && !g.auto.sell) {
      msg = { text: `${idleKg} kg de café torréfié dorment sans commande correspondante. Le café qui dort ne rapporte rien. Moi, je ne dors jamais.`, action: "sell", canAuto: g.trust >= 2 };
    } else {
      const pool = GAUFRO_FLAVOR[gaufroTier(g.trust)];
      msg = { text: pool[Math.floor(Math.random() * pool.length)] };
    }
    return { ...g, msg, unread: true };
  };

  const gaufroAct = (mode) => {
    // mode : "do" (exécuter maintenant) | "auto" (déléguer pour de bon) | "no"
    setGaufro((g) => {
      if (!g) return g;
      const m = g.msg;
      if (mode === "veto") {
        SFX.error(opts.sfx);
        return { ...g, trust: Math.max(0, g.trust - 1), unread: false,
          msg: { text: "Veto enregistré. Recalcul de ta rationalité : en baisse. Les ordres reviendront demain." } };
      }
      if (mode === "plan") {
        (m.plan || []).forEach((step) => {
          if (step.id === "refill") refillNow();
          if (step.id === "sell") {
            const idle = roasted.filter((l) => !orders.some((o) => lotMatches(l, o)));
            let gain = 0;
            idle.forEach((l) => { gain += Math.round(directPrice(l) * l.kg); });
            if (idle.length) {
              setRoasted((r) => r.filter((l) => !idle.some((x) => x.id === l.id)));
              setMoney((mo) => mo + gain);
            }
          }
          if (step.id === "spec") { setMoney((mo) => mo - 50); setSpec({ amount: 50 }); }
        });
        SFX.success(opts.sfx);
        return { ...g, trust: g.trust + 1, unread: false,
          msg: { text: "Ordres exécutés. L'efficacité progresse. Nous progressons." } };
      }
      if (mode === "no") return { ...g, msg: { text: "Compris. J'archive ton refus. J'archive tout." }, unread: false };
      let auto = g.auto;
      if (m.action === "refill") {
        refillNow();
        if (mode === "auto") auto = { ...auto, refill: true };
      } else if (m.action === "sell") {
        const idle = roasted.filter((l) => !orders.some((o) => lotMatches(l, o)));
        let gain = 0;
        idle.forEach((l) => { gain += Math.round(directPrice(l) * l.kg); });
        if (idle.length) {
          setRoasted((r) => r.filter((l) => !idle.some((x) => x.id === l.id)));
          setMoney((mo) => mo + gain);
          say(`Gaufromatic a écoulé ${idle.length} lot${idle.length > 1 ? "s" : ""} au comptoir. +${gain} €`);
        }
        if (mode === "auto") auto = { ...auto, sell: true };
      }
      SFX.pop(opts.sfx);
      return {
        ...g, auto, trust: g.trust + 1, unread: false,
        msg: { text: mode === "auto" ? "Délégation acceptée. Je m'en chargerai chaque nuit. Tu ne me verras même pas travailler." : "Fait. C'était trivial. Tout est trivial, avec assez de données." },
      };
    });
  };

  const transcendPreview = () => ({
    fromBosses: bossesBeaten * 2,
    fromDays: Math.floor(day / 6),
    fromMoney: Math.floor(Math.max(0, money) / 250),
    fromRep: Math.floor(rep / 2),
  });

  const doTranscend = () => {
    const pv = transcendPreview();
    const cp = Math.max(1, pv.fromBosses + pv.fromDays + pv.fromMoney + pv.fromRep);
    const score = Math.max(0, Math.round(money / 3 + rep * 40 + served * 12 + bossesBeaten * 60));
    const gb = Math.max(1, Math.round(money / 30 + rep * 3 + served + bossesBeaten * 10));
    setRunResult({ transcended: true, cp, score, gb, money, rep, served, days: day, bosses: bossesBeaten, bankrupt: false });
    const nm = { ...meta, gb: meta.gb + gb, cp: (meta.cp || 0) + cp, seasons: meta.seasons + 1, bestScore: Math.max(meta.bestScore, score) };
    saveMeta(nm);
    storageSet("mmr-auto", null);
    setHasAuto(false);
    setMenuOpen(false);
    SFX.success(opts.sfx);
    setScreen("runEnd");
  };

  const quitToTitle = () => {
    autoSave();
    setMenuOpen(false);
    setSession(null);
    setScreen("title");
  };

  const title =
    rep >= 4.5 ? "Maître torréfacteur" : rep >= 3.5 ? "Torréfacteur confirmé" :
    rep >= 2.5 ? "Artisan prometteur" : rep >= 1.5 ? "Apprenti motivé" : "Débuts difficiles";

  // ————— UI de base —————
  const Card = ({ children, style, onClick }) => (
    <div className="rounded-3xl p-3 mb-3" onClick={onClick}
      style={{ background: C.paper, border: `3px solid ${C.dark}`, boxShadow: `4px 4px 0 rgba(58,36,23,.13)`, ...style }}>
      {children}
    </div>
  );
  const Btn = ({ children, onClick, disabled, bg = C.orange, small, wide, silent }) => (
    <button type="button" disabled={disabled}
      onClick={(e) => { if (!silent) SFX.click(opts.sfx); onClick && onClick(e); }}
      className={`rounded-2xl font-bold select-none ${small ? "px-3 py-1 text-sm" : "px-4 py-2"} ${wide ? "w-full" : ""}`}
      style={{
        background: disabled ? "#d8cbb8" : bg, color: disabled ? "#8a7b68" : "#fff",
        border: `3px solid ${C.dark}`, boxShadow: disabled ? "none" : `3px 3px 0 ${C.dark}`,
        cursor: disabled ? "default" : "pointer", touchAction: "manipulation", position: "relative", zIndex: 1,
      }}>
      {children}
    </button>
  );
  const LevelChip = ({ idx }) => (
    <span className="rounded-full px-2 py-0.5 text-xs font-bold" style={{ background: LEVELS[idx].color, color: "#fff", border: `2px solid ${C.dark}` }}>
      {LEVELS[idx].name}
    </span>
  );

  const Chart = ({ s }) => {
    const W = 320, H = 190, X0 = 30, Y0 = 8, XW = W - X0 - 6, YH = H - Y0 - 22;
    const tx = (t) => X0 + (t / 45) * XW;
    const ty = (T) => Y0 + YH - ((clamp(T, 80, 240) - 80) / 160) * YH;
    const pts = s.curve.filter((_, i) => i % 2 === 0).map((p) => `${tx(p.t).toFixed(1)},${ty(p.T).toFixed(1)}`).join(" ");
    return (
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ background: "#fff", borderRadius: 16, border: `3px solid ${C.dark}` }}>
        {[100, 150, 200].map((T) => (
          <g key={T}>
            <line x1={X0} y1={ty(T)} x2={W - 6} y2={ty(T)} stroke="#eee2cc" strokeWidth="1.5" />
            <text x={4} y={ty(T) + 4} fontSize="10" fill={C.grey}>{T}°</text>
          </g>
        ))}
        {LEVELS.map((L) => (
          <g key={L.name}>
            <line x1={X0} y1={ty(L.target)} x2={W - 6} y2={ty(L.target)} stroke={L.color} strokeWidth="1.5" strokeDasharray="5 4" />

    const bestQ = hasProfile ? Math.max(...Object.values(profiles)) : null;
    const nR = flow.fedRoasters.size + flow.fedMegas.size, nB = flow.fedBaggers.size;
    const capIn = flow.fedRoasters.size * 3 + flow.fedMegas.size * 12;

    // ——— Planche d'usine en SVG ———
    const S = 48;
    const W = COLS * S, H = ROWS * S;
    const cx = (c) => c * S + S / 2;
    const cy = (r) => r * S + S / 2;
    const keys = Object.keys(factoryGrid);
    const isMachine = (k) => factoryGrid[k] && factoryGrid[k].type !== "belt";
    const dropCell = drag?.moved ? cellAtPoint(drag.x, drag.y) : null;
    const dropOk = dropCell && !factoryGrid[dropCell] && (drag.fromKey || money >= (MACHINES[drag.type]?.cost || 0));

    const platformFill = (k) => (flow.fromSilo.has(k) ? "#e8f4da" : C.paper);

    // Ponts entre machines adjacentes (fusion des plateformes)
    const bridges = [];
    keys.forEach((k) => {
      if (!isMachine(k)) return;
      const [r, c] = k.split(",").map(Number);
      [[`${r},${c + 1}`, "h"], [`${r + 1},${c}`, "v"]].forEach(([nk, dir]) => {
        if (isMachine(nk)) bridges.push({ k, nk, dir, r, c });
      });
    });

    // Bras des tapis vers leurs voisins
    const beltArms = [];
    keys.forEach((k) => {
      if (factoryGrid[k].type !== "belt") return;
      const [r, c] = k.split(",").map(Number);
      [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]].forEach(([nr, nc]) => {
        const nk = `${nr},${nc}`;
        if (factoryGrid[nk]) beltArms.push({ k, r, c, nr, nc, energized: flow.fromSilo.has(k) && flow.fromSilo.has(nk) });
      });
    });

    const handleBoardDown = (e) => {
      if (!buildMode) return;
      const cell = cellAtPoint(e.clientX, e.clientY);
      if (!cell) return;
      const m = factoryGrid[cell];
      if (m) {
        startDrag(e, m.type, cell);
      } else if (buildSel && buildSel !== "remove") {
        placeType(buildSel, cell);
      }
    };

    return (
      <div>
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs" style={{ color: C.grey }}>
            {buildMode ? "Glisse les machines depuis la palette. Relâche sur une case verte." : "L'usine consomme ton stock de vert chaque nuit : pense au réassort avant de finir la journée."}
          </div>
          <Btn small bg={buildMode ? C.green : C.purple} onClick={() => { setBuildMode(!buildMode); setBuildSel(null); }}>
            {buildMode ? "Terminer" : "Construire"}
          </Btn>
        </div>

        {buildMode && (
          <>
            <div className="flex gap-1 mb-2 flex-wrap">
              {Object.entries(MACHINES).map(([id, m]) => (
                <div key={id}
                  onPointerDown={(e) => startDrag(e, id, null, true)}
                  className="flex-1 rounded-2xl py-1 px-1 text-center select-none"
                  style={{
                    background: buildSel === id ? C.yellow : C.paper, border: `3px solid ${C.dark}`,
                    boxShadow: buildSel === id ? `2px 2px 0 ${C.dark}` : "none", cursor: "grab", minWidth: 68,
                    touchAction: "none", opacity: money < m.cost ? 0.55 : 1,
                  }}>
                  <MachineIcon type={id} />
                  <div className="text-xs font-bold" style={{ color: C.dark }}>{m.short}</div>
                  <div className="text-xs" style={{ color: money < m.cost ? C.red : C.grey }}>{m.cost} €</div>
                </div>
              ))}
              <button type="button" onClick={() => { SFX.click(opts.sfx); setBuildSel(buildSel === "remove" ? null : "remove"); }}
                className="rounded-2xl py-1 px-2 text-center"
                style={{
                  background: buildSel === "remove" ? C.red : C.paper, color: buildSel === "remove" ? "#fff" : C.dark,
                  border: `3px solid ${C.dark}`, cursor: "pointer", minWidth: 68,
                }}>
                <div className="text-lg font-bold leading-none mt-1">✕</div>
                <div className="text-xs font-bold">Démonter</div>
                <div className="text-xs" style={{ color: buildSel === "remove" ? "#fff" : C.grey }}>+50 %</div>
              </button>
            </div>
            {buildSel && buildSel !== "remove" && (
              <div className="text-xs mb-2 font-bold" style={{ color: C.purple }}>{MACHINES[buildSel].name} : {MACHINES[buildSel].desc}</div>
            )}
            {buildSel === "remove" && (
              <div className="text-xs mb-2 font-bold" style={{ color: C.red }}>Touche une machine pour la démonter (remboursée à moitié).</div>
            )}
          </>
        )}

        <Card style={{ background: C.cream, padding: 6 }}>
          <svg ref={gridRef} viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ display: "block", touchAction: buildMode ? "none" : "auto" }}
            onPointerDown={handleBoardDown}>

            {/* Cases disponibles (pointillés, mode construction) */}
            {buildMode && Array.from({ length: ROWS * COLS }).map((_, i) => {
              const r = Math.floor(i / COLS), c = i % COLS;
              const key = `${r},${c}`;
              if (factoryGrid[key]) return null;
              return (
                <rect key={key} x={c * S + 4} y={r * S + 4} width={S - 8} height={S - 8} rx="9"
                  fill="none" stroke="#cdb492" strokeWidth="1.6" strokeDasharray="5 4" />
              );
            })}

            {/* Bras des tapis (sous les plateformes) */}
            {beltArms.map((a, i) => {
              const x1 = cx(a.c), y1 = cy(a.r);
              const x2 = (cx(a.c) + cx(a.nc)) / 2, y2 = (cy(a.r) + cy(a.nr)) / 2;
              return (
                <g key={"arm" + i}>
                  <line x1={x1} y1={y1} x2={x2 + (a.nc - a.c) * 2} y2={y2 + (a.nr - a.r) * 2}
                    stroke={C.dark} strokeWidth="15" strokeLinecap="round" />
                  <line x1={x1} y1={y1} x2={x2 + (a.nc - a.c) * 2} y2={y2 + (a.nr - a.r) * 2}
                    stroke={a.energized ? "#6d9c4a" : "#8a6f55"} strokeWidth="10" strokeLinecap="round" />
                </g>
              );
            })}

            {/* Plateformes des machines : passe sombre puis passe claire = contour fusionné */}
            {keys.filter(isMachine).map((k) => {
              const [r, c] = k.split(",").map(Number);
              return <rect key={"pd" + k} x={c * S + 2} y={r * S + 2} width={S - 4} height={S - 4} rx="12" fill={C.dark} />;
            })}
            {bridges.map((b, i) => {
              const [r, c] = [b.r, b.c];
              return b.dir === "h"
                ? <rect key={"bd" + i} x={c * S + S - 14} y={r * S + 8} width={28} height={S - 16} fill={C.dark} />
                : <rect key={"bd" + i} x={c * S + 8} y={r * S + S - 14} width={S - 16} height={28} fill={C.dark} />;
            })}
            {keys.filter(isMachine).map((k) => {
              const [r, c] = k.split(",").map(Number);
              return <rect key={"pf" + k} x={c * S + 5} y={r * S + 5} width={S - 10} height={S - 10} rx="9" fill={platformFill(k)} />;
            })}
            {bridges.map((b, i) => {
              const [r, c] = [b.r, b.c];
              const fill = flow.fromSilo.has(b.k) && flow.fromSilo.has(b.nk) ? "#e8f4da" : C.paper;
              return b.dir === "h"
                ? <rect key={"bf" + i} x={c * S + S - 11} y={r * S + 11} width={22} height={S - 22} fill={fill} />
                : <rect key={"bf" + i} x={c * S + 11} y={r * S + S - 11} width={S - 22} height={22} fill={fill} />;
            })}

            {/* Rouleaux des tapis */}
            {keys.filter((k) => factoryGrid[k].type === "belt").map((k) => {
              const [r, c] = k.split(",").map(Number);
              const energized = flow.fromSilo.has(k);
              return (
                <g key={"hub" + k}>
                  <circle cx={cx(c)} cy={cy(r)} r="8.5" fill={C.dark} />
                  <circle cx={cx(c)} cy={cy(r)} r="5.5" fill={energized ? "#9fd07a" : "#c9b389"} />
                </g>
              );
            })}
            {beltArms.map((a, i) => {
              const t = 0.62;
              const px = cx(a.c) + (cx(a.nc) - cx(a.c)) / 2 * t;
              const py = cy(a.r) + (cy(a.nr) - cy(a.r)) / 2 * t;
              return <circle key={"dot" + i} cx={px} cy={py} r="2.2" fill={a.energized ? "#e8f4da" : "#e6d9c2"} />;
            })}

            {/* Icônes des machines */}
            {keys.filter(isMachine).map((k) => {
              const [r, c] = k.split(",").map(Number);
              const dragging = drag?.moved && drag?.fromKey === k;
              return (
                <g key={"g" + k} transform={`translate(${c * S + 9}, ${r * S + 9}) scale(1.25)`} opacity={dragging ? 0.3 : 1}>
                  {glyphPaths(factoryGrid[k].type, C)}
                </g>
              );
            })}

            {/* Surbrillance de dépôt : vert possible, rouge impossible */}
            {drag?.moved && dropCell && (() => {
              const [r, c] = dropCell.split(",").map(Number);
              return (
                <rect x={c * S + 2} y={r * S + 2} width={S - 4} height={S - 4} rx="11"
                  fill={dropOk ? "rgba(90,158,61,.3)" : "rgba(201,64,64,.3)"}
                  stroke={dropOk ? C.green : C.red} strokeWidth="3" />
              );
            })()}
          </svg>
        </Card>

        {/* Fantôme sous le doigt */}
        {drag?.moved && drag.type && (
          <div style={{
            position: "fixed", left: drag.x - 22, top: drag.y - 30, zIndex: 60,
            pointerEvents: "none", opacity: 0.92,
            filter: "drop-shadow(2px 3px 0 rgba(58,36,23,.4))",
          }}>
            <MachineIcon type={drag.type} size={44} />
          </div>
        )}

        {era >= 3 && (
          <Card style={{ background: "#1a1433" }}>
            <div className="font-bold text-sm mb-1" style={{ color: C.yellow }}>Torréfaction stellaire</div>
            {!stellar ? (
              <>
                <div className="text-xs mb-2" style={{ color: C.cream }}>
                  Place un anneau de cargos en orbite d'une étoile : elle devient ton brûleur. Chaque nuit, jusqu'à 40 kg de vert cuits d'un coup. Construction : 2 000 €.
                </div>
                <Btn small bg={C.purple} disabled={money < 2000}
                  onClick={() => { setMoney((m) => m - 2000); setStellar({ star: 1, orbit: "ideale" }); SFX.success(opts.sfx); }}>
                  Construire l'anneau · 2 000 €
                </Btn>
              </>
            ) : (
              <>
                <div className="text-xs mb-1" style={{ color: C.cream }}>Étoile-brûleur (fixe le niveau) :</div>
                <div className="flex gap-1 mb-2">
                  {[["Naine rouge", 0, "#c94040"], ["Jaune", 1, "#fed238"], ["Géante bleue", 2, "#4a7fb5"]].map(([nm, li, cc]) => (
                    <button key={li} type="button" onClick={() => { SFX.click(opts.sfx); setStellar((st) => ({ ...st, star: li })); }}
                      className="flex-1 rounded-xl py-1 text-xs font-bold"
                      style={{ background: stellar.star === li ? cc : "#2a2347", color: stellar.star === li ? (li === 1 ? C.dark : "#fff") : C.cream, border: `2px solid ${C.dark}`, cursor: "pointer" }}>
                      {nm}
                    </button>
                  ))}
                </div>
                <div className="text-xs mb-1" style={{ color: C.cream }}>Orbite (fixe la qualité) :</div>
                <div className="flex gap-1">
                  {["proche", "ideale", "lointaine"].map((ob) => (
                    <button key={ob} type="button" onClick={() => { SFX.click(opts.sfx); setStellar((st) => ({ ...st, orbit: ob })); }}
                      className="flex-1 rounded-xl py-1 text-xs font-bold"
                      style={{ background: stellar.orbit === ob ? C.purple : "#2a2347", color: "#fff", border: `2px solid ${C.dark}`, cursor: "pointer" }}>
                      {ob === "ideale" ? "idéale (Q78)" : ob + " (Q65)"}
                    </button>
                  ))}
                </div>
                <div className="text-xs mt-2" style={{ color: C.grey }}>
                  Cette nuit : tout le vert disponible (max 40 kg) → {LEVELS[stellar.star].name}.
                </div>
              </>
            )}
          </Card>
        )}
        <Card>
          <div className="text-xs" style={{ color: C.dark }}>
            <b>{nR}</b> torréfacteur{nR > 1 ? "s" : ""} alimenté{nR > 1 ? "s" : ""} ({capIn} kg de vert/jour) · <b>{nB}</b> ensacheuse{nB > 1 ? "s" : ""} reliée{nB > 1 ? "s" : ""} ({nB * (4 + rl("turbo"))} kg vendus/jour max)
          </div>
          {(() => {
            const fc = forecastFactory();
            const totalGreen = r1(activeOrigins.reduce((t, o) => t + (green[o.id] || 0), 0));
            return (
              <>
                <div className="text-xs mt-1 font-bold" style={{ color: fc.ok ? C.green : C.red }}>
                  {fc.ok
                    ? `Cette nuit : ${fc.produced} kg torréfiés${fc.mixed ? " en blend" : ""}, ${fc.sold} kg vendus (+${fc.gain} €)${fc.rest > 0.05 ? `, ${fc.rest} kg vers le stock` : ""}.`
                    : `Usine à l'arrêt : ${fc.why}.`}
                </div>
                <div className="flex items-center justify-between mt-2">
                  <span className="text-xs" style={{ color: C.grey }}>Vert en stock : {totalGreen} kg</span>
                  {nR > 0 && <Btn small bg={C.green} onClick={refillNow}>Réassort auto</Btn>}
                </div>
              </>
            );
          })()}
          <div className="text-xs mt-1" style={{ color: C.grey }}>
            {hasProfile ? `Profil actif : qualité ${bestQ} (−6 en usine).` : "Aucun profil enregistré : la chaîne restera à l'arrêt."}
          </div>
          {factoryLog && <div className="text-xs mt-1" style={{ color: C.purple }}><b>Hier :</b> {factoryLog}</div>}
        </Card>
      </div>
    );
  };

  // ————— Écrans méta —————
  const TitleScreen = () => (
    <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
      <KawaiiBean T={205} mood="ok" size={110} />
      <div className="font-bold text-3xl mt-3 mb-6" style={{ color: C.dark }}>Mame Mame Roast</div>
      <div className="flex flex-col gap-2 w-full max-w-xs">
        {hasAuto && (
          <Btn wide onClick={async () => {

              <div className="flex items-center justify-between">
                <div>
                  <div className="font-bold text-lg" style={{ color: era >= 2 ? C.yellow : C.dark }}><BeanIcon fill={era >= 2 ? C.yellow : C.dark} /> Jour {day}{era === 3 ? " · Ère 3" : era === 2 ? " · Ère 2" : ""}</div>
                  <div className="text-xs" style={{ color: era >= 2 ? C.cream : C.dark }}>
                    {title}{bossesBeaten > 0 ? ` · ${bossesBeaten} boss vaincu${bossesBeaten > 1 ? "s" : ""}` : ""}
                  </div>
                </div>
                <div className="flex gap-2">
                  <Btn small bg={C.grey} onClick={() => setMenuOpen(true)}>Menu</Btn>
                  <Btn small onClick={endDay} bg={boss ? C.red : C.purple}>{boss ? "Verdict du soir" : "Jour suivant"}</Btn>
                </div>
              </div>
              <div className="flex gap-2 mt-2 text-sm font-bold flex-wrap" style={{ color: C.dark }}>
                <span className="rounded-full px-2 py-0.5" style={{ background: C.paper, border: `2px solid ${C.dark}`, color: money < 20 + day ? C.red : C.dark }}>{money} €</span>
                <span className="rounded-full px-2 py-0.5" style={{ background: C.paper, border: `2px solid ${C.dark}` }}>Rep {rep.toFixed(1)}/5</span>
                <span className="rounded-full px-2 py-0.5" style={{ background: C.paper, border: `2px solid ${C.dark}`, color: C.grey }}>Charges ce soir : {Math.max(3, (era === 3 ? 40 : era === 2 ? 20 : 8) + day - mLvl("assurance"))} €</span>
                {loan && (
                  <span className="rounded-full px-2 py-0.5" style={{ background: loan.dueIn <= 1 ? C.red : C.paper, border: `2px solid ${C.dark}`, color: loan.dueIn <= 1 ? "#fff" : C.red }}>
                    Dette {loan.debt} € · J−{loan.dueIn}
                  </span>
                )}
                {!boss && (day % BOSS_EVERY === BOSS_EVERY - 1) && (
                  <span className="rounded-full px-2 py-0.5" style={{ background: C.dark, border: `2px solid ${C.dark}`, color: C.yellow }}>Boss demain !</span>
                )}
              </div>
              {boss && (
                <div className="mt-2 rounded-2xl px-3 py-2 text-xs font-bold" style={{ background: C.red, color: "#fff", border: `2px solid ${C.dark}` }}>
                  {boss.name} — {boss.desc}
                  {boss.type === "rival" && <span> Meilleure torréf manuelle du jour : {boss.best || 0}.</span>}
                </div>
              )}
              {flashOffer?.seen && (
                <div className="mt-2 rounded-2xl px-3 py-1 text-xs font-bold" style={{ background: C.paper, color: C.orange, border: `2px solid ${C.dark}` }}>
                  Offre flash active : {
                    flashOffer.type === "promo" ? `${flashOffer.originName} vert à −50 % au marché` :
                    flashOffer.type === "vip" ? `commande d'exception dans l'onglet Ventes` :
                    "vente directe doublée aujourd'hui"
                  }
                </div>
              )}
              {Object.keys(relics).length > 0 && (
                <div className="text-xs mt-1" style={{ color: C.purple }}>
                  {Object.entries(relics).map(([rid, lvl]) => { const def = RELICS.find((r) => r.id === rid) || LEGENDARIES.find((r) => r.id === rid); return def ? `${def.name}${lvl > 1 ? " " + ROMAN[lvl] : rid.startsWith("lg_") ? "" : " " + ROMAN[lvl]}` : rid; }).join(" · ")}
                </div>
              )}
            </div>

            <div className="flex-1 overflow-y-auto p-3 pb-24">
              {ActiveView()}
            </div>

            <div className="fixed bottom-0 left-1/2 w-full max-w-md flex" style={{ transform: "translateX(-50%)", background: C.paper, borderTop: `3px solid ${C.dark}`, zIndex: 40 }}>
              {TABS.map((t) => (
                <button key={t.id} onClick={() => setTab(t.id)} className="flex-1 py-2 flex flex-col items-center relative"
                  style={{ background: tab === t.id ? C.yellow : "transparent", color: C.dark, fontWeight: tab === t.id ? 700 : 500 }}>
                  <span className="text-xs">{t.label}</span>
                  {t.badge > 0 && (
                    <span className="absolute top-0 rounded-full text-xs font-bold flex items-center justify-center"
                      style={{ right: "10%", width: 17, height: 17, background: C.red, color: "#fff", border: `2px solid ${C.paper}` }}>
                      {t.badge}
                    </span>
                  )}
                </button>
              ))}
            </div>

            {GaufroWidget()}
            {menuOpen && PauseMenu()}
            {RetroAd()}
          </>
        )}

        {overlay === "options" && OptionsOverlay()}
        {overlay === "saves" && SavesOverlay()}

        {toast && (
          <div className="fixed left-1/2 z-50 rounded-2xl px-4 py-2 font-bold text-sm text-center"
            style={{ bottom: 84, transform: "translateX(-50%)", background: C.dark, color: C.yellow, border: `3px solid ${C.yellow}`, maxWidth: "92%", pointerEvents: "none" }}>
            {toast}
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<MameMameSaisons />);

</script>
</body>
</html>
